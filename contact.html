body, html {

/* Background slideshow */
.bg-slideshow {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -2;
}

.bg-slideshow img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  animation: slide 20s infinite;
}

.bg-slideshow img:nth-child(1){animation-delay:0s;}
.bg-slideshow img:nth-child(2){animation-delay:5s;}
.bg-slideshow img:nth-child(3){animation-delay:10s;}
.bg-slideshow img:nth-child(4){animation-delay:15s;}

@keyframes slide {
  0%{opacity:0;}
  10%{opacity:1;}
  25%{opacity:1;}
  35%{opacity:0;}
  100%{opacity:0;}
}

/* Overlay (lighter so images show) */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
  z-index: -1;

.box {

  margin-bottom: 20px;
  color: #000;
  backdrop-filter: blur(5px);

iframe {

/* WhatsApp */

<!-- EMAIL SCRIPT -->
<script>
(function(){
  emailjs.init("YOUR_PUBLIC_KEY"); // 🔴 replace this
})();

document.getElementById("contactForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const btn = document.getElementById("sendBtn");
  btn.innerText = "Sending...";

  emailjs.sendForm(
    "YOUR_SERVICE_ID",   // 🔴 replace this
    "YOUR_TEMPLATE_ID",  // 🔴 replace this
    this
  ).then(function() {
    alert("✅ Message sent successfully!");
    document.getElementById("contactForm").reset();
    btn.innerText = "Send Message";
  }).catch(function(error) {
    console.error(error);
    alert("❌ Failed to send message");
    btn.innerText = "Send Message";
  });
});
</script>
