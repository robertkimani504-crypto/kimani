/* HERO */
.hero {
    background: linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url('https://picsum.photos/1600/500') center/cover;
    color: white;
    text-align: center;
    padding: 80px 20px;
}

/* GRID 5 COLUMNS */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 20px;
}

.gallery-grid img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.3s;
}

.gallery-grid img:hover {
    transform: scale(1.05);
}

/* MOBILE RESPONSIVE */
@media (max-width: 1200px) {
    .gallery-grid { grid-template-columns: repeat(4, 1fr); }
}

@media (max-width: 768px) {
    .gallery-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 480px) {
    .gallery-grid { grid-template-columns: 1fr; }
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.95);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}

.lightbox img {
    max-width: 80%;
    max-height: 80%;
    border-radius: 10px;
    transition: transform 0.3s;
}

/* BUTTONS */
.controls {
    margin-top: 15px;
}

.controls button {
    background: white;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

.controls button:hover {
    background: #ddd;
}

.zoom {
    margin-top: 10px;
}

</style>

<script>

let images = document.querySelectorAll(".gallery-grid img");
let currentIndex = 0;
let scale = 1;

function openLightbox(index) {
    currentIndex = index;
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = images[index].src;
    scale = 1;
    document.getElementById("lightbox-img").style.transform = "scale(1)";
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}

function nextImg() {
    currentIndex = (currentIndex + 1) % images.length;
    openLightbox(currentIndex);
}

function prevImg() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    openLightbox(currentIndex);
}

function zoomIn() {
    scale += 0.2;
    document.getElementById("lightbox-img").style.transform = "scale(" + scale + ")";
}

function zoomOut() {
    scale -= 0.2;
    if (scale < 1) scale = 1;
    document.getElementById("lightbox-img").style.transform = "scale(" + scale + ")";
}

</script>
